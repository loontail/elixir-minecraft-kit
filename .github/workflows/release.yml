name: Release

# Runs on every push to `main`. If `package.json` has a version that hasn't been tagged
# yet, the workflow publishes that version to npm, then creates and pushes the matching
# `vX.Y.Z` tag plus a GitHub release. Commits that don't bump the version are no-ops.
#
# Release flow:
#   1. Open a "chore(release): X.Y.Z" PR that runs `npm version --no-git-tag-version`.
#   2. Merge the PR through normal review.
#   3. This workflow detects the new version and ships it.
on:
  push:
    branches: [main]

jobs:
  gate:
    name: Detect version change
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
      tag: ${{ steps.check.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so `git rev-parse <tag>` can see existing tags.
          fetch-depth: 0

      - id: check
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          TAG="v$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists — version not bumped on this push. Skipping."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Tag $TAG is new — releasing version $VERSION."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  release:
    name: Publish to npm + tag
    needs: gate
    if: needs.gate.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    # `contents: write` lets the job push the version tag back. Branch protection rules
    # apply to branches, not tags, so this push goes through.
    # `id-token: write` enables npm provenance.
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use the default GITHUB_TOKEN to push the tag. It is a repo-scoped token, not
          # a PAT — it does not bypass branch protection but it can push tags.
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20.11"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - run: npm ci

      # Re-run every gate even though ci.yml already ran them on the merged PR — this is
      # the last point where we can stop a bad publish.
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build

      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Tag is created AFTER the publish succeeds. If publish fails, no tag is written
      # and the next workflow run for the same version will retry cleanly.
      - name: Tag release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ needs.gate.outputs.tag }}" -m "Release ${{ needs.gate.outputs.version }}"
          git push origin "${{ needs.gate.outputs.tag }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.gate.outputs.tag }}
          name: ${{ needs.gate.outputs.tag }}
          generate_release_notes: true
