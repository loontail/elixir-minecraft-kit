name: Release

# Runs on every push to `main`. Auto-bumps the patch version, pushes a
# `chore(release): vX.Y.Z [skip release]` commit + matching `vX.Y.Z` tag back to
# main, publishes to npm with provenance, and creates a GitHub Release.
#
# Required secrets:
#   NPM_TOKEN      — npm automation token with publish scope on @loontail/minecraft-kit.
#   RELEASE_TOKEN  — fine-grained PAT (Contents: read/write) owned by a user in the
#                    repo's branch ruleset bypass list. The default GITHUB_TOKEN cannot
#                    push directly to a protected `main`; RELEASE_TOKEN can.
#
# Loop guard: the bump commit ("chore(release): vX.Y.Z [skip release]") triggers this
# workflow again; the guard job short-circuits when the marker is present so the
# release does not chain into itself.
#
# To ship something other than a patch (minor / major), bump the version locally with
# `npm version minor --no-git-tag-version`, commit with `[skip release]` in the
# message, and let the next regular commit on `main` re-trigger the workflow — the
# bump step will then increment from the already-bumped baseline.

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  guard:
    name: Guard
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - id: check
        env:
          MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          if echo "$MESSAGE" | grep -qE '\[skip release\]|^chore\(release\):'; then
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "Bump / skip-release commit detected — skipping release."
          else
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure required secrets are configured
        if: steps.check.outputs.proceed == 'true'
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          missing=()
          [ -z "$NPM_TOKEN" ] && missing+=("NPM_TOKEN")
          [ -z "$RELEASE_TOKEN" ] && missing+=("RELEASE_TOKEN")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secret(s): ${missing[*]}. Set them under Settings → Secrets and variables → Actions before pushing to main."
            exit 1
          fi

  bump:
    name: Bump version
    needs: guard
    if: needs.guard.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # PAT belongs to a repo admin (bypass list), so the push below bypasses
          # the "Require pull request" ruleset on main.
          token: ${{ secrets.RELEASE_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20.11"
          cache: npm

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version
        id: bump
        run: |
          version=$(npm version patch --no-git-tag-version)
          plain="${version#v}"
          tag="v${plain}"
          git add package.json package-lock.json
          git commit -m "chore(release): ${tag} [skip release]"
          git tag "${tag}"
          git push origin HEAD:main
          git push origin "${tag}"
          echo "version=${plain}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

  release:
    name: Publish to npm
    needs: bump
    runs-on: ubuntu-latest
    # `contents: write` lets the job create a GitHub Release. `id-token: write`
    # enables npm provenance.
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Build and publish from the bump tag exactly. If anything else lands on
          # main while this job is queued, we still ship the version we tagged.
          ref: ${{ needs.bump.outputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20.11"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - run: npm ci

      # Re-run every gate even though ci.yml already ran them on the merged PR —
      # this is the last point where we can stop a bad publish.
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build

      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump.outputs.tag }}
          name: ${{ needs.bump.outputs.tag }}
          generate_release_notes: true
